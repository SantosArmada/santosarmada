<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Globo — Santos Armada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="globe.css">
    <link rel="stylesheet" href="timeline.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

</head>
<body class="globe-page">

<nav class="navbar">
    <a href="/" class="nav-logo">
        <img src="images/logo.PNG" alt="Santos Armada" class="nav-crest">
        <span class="nav-title">SANTOS ARMADA</span>
    </a>
</nav>

<div class="globe-watermark">
    <img src="images/logo.PNG" alt="" class="globe-watermark-img">
</div>

<div id="globeViz"></div>

<!-- Scroll-down indicator -->
<button type="button" class="globe-scroll-cue" id="globe-scroll-cue" aria-label="Scroll to timeline">
    <span>scroll</span>
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 4v16M5 13l7 7 7-7"/>
    </svg>
</button>

<section class="timeline-section">
    <div id="timelineMount"></div>
</section>
<div class="globe-info-panel" id="infoPanel">
    <p class="globe-info-label">Click a country</p>
    <h3 class="globe-info-title">Explore the Armada's Map</h3>
    <p class="globe-info-body">Each glowing country connects to authors, works, and history tied to that place.</p>
</div>


<script src="https://unpkg.com/globe.gl@2.31.0/dist/globe.gl.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script src="globe.js"></script>
<script src="timeline-data.js"></script>
<script src="timeline.js"></script>
<script>
document.getElementById('globe-scroll-cue').addEventListener('click', () => {
    document.querySelector('.timeline-section').scrollIntoView({ behavior: 'smooth' });
});
</script>
</body>
</html>
